<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時報到系統 - 管理統計</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .stat-card h2 {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .stat-card .number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-card .unit {
            color: #999;
            font-size: 12px;
        }

        .records-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .records-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background: #f5f5f5;
        }

        table th {
            padding: 15px;
            text-align: left;
            color: #333;
            font-weight: 600;
            border-bottom: 2px solid #ddd;
        }

        table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            color: #666;
        }

        table tbody tr:hover {
            background: #f9f9f9;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-checked_in {
            background: #d4edda;
            color: #155724;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #764ba2;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 即時報到系統 - 管理統計</h1>
            <p>實時監測報到情況</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h2>總報到人數</h2>
                <div class="number" id="totalCheckedIn">-</div>
                <div class="unit">人</div>
            </div>
        </div>

        <div class="records-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>📝 報到記錄</h2>
                <button class="refresh-btn" onclick="loadRecords()">🔄 刷新</button>
            </div>

            <div id="errorMessage"></div>

            <div id="loading" class="loading">
                加載中...
            </div>

            <div id="content" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>序號</th>
                            <th>戶號</th>
                            <th>姓名</th>
                            <th>報到時間</th>
                            <th>狀態</th>
                        </tr>
                    </thead>
                    <tbody id="recordsEl"></tbody>
                </table>
            </div>

            <div id="noData" class="no-data" style="display: none;">
                暫無報到記錄
            </div>
        </div>

        <div class="footer">
            <p>最後更新：<span id="lastUpdate">-</span></p>
        </div>
    </div>

    <script>
        const API_URL = '/api/check-in';
        const REFRESH_INTERVAL_MS = 5000;
        let refreshTimer = null;

        async function loadStatistics() {
            try {
                const response = await fetch(`${API_URL}/statistics`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById('totalCheckedIn').textContent = data.data.total_checked_in;
                }
            } catch (error) {
                console.error('統計載入失敗:', error);
            }
        }

        async function loadRecords() {
            try {
                document.getElementById('errorMessage').innerHTML = '';
                document.getElementById('loading').style.display = 'block';
                document.getElementById('content').style.display = 'none';
                document.getElementById('noData').style.display = 'none';

                const response = await fetch(`${API_URL}/records?limit=100`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                if (data.success) {
                    renderRecords(data.data);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    throw new Error(data.message || '載入失敗');
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMessage').innerHTML = `<div class="error">⚠️ ${error.message}</div>`;
            }
        }

        function renderRecords(records) {
            const recordsEl = document.getElementById('recordsEl');
            
            if (!records || records.length === 0) {
                document.getElementById('content').style.display = 'none';
                document.getElementById('noData').style.display = 'block';
                return;
            }

            recordsEl.innerHTML = '';
            for (let i = 0; i < records.length; i++) {
                const r = records[i];
                const tr = document.createElement('tr');
                
                const cells = [
                    (i + 1).toString(),
                    r.household_id || '-',
                    r.name || '-',
                    r.check_in_time || '-',
                    r.status || '-'
                ];

                for (let j = 0; j < cells.length; j++) {
                    const td = document.createElement('td');
                    if (j === 4) {
                        const badge = document.createElement('span');
                        badge.className = `status-badge status-${cells[j]}`;
                        badge.textContent = cells[j] === 'checked_in' ? '✓ 已報到' : cells[j];
                        td.appendChild(badge);
                    } else {
                        td.textContent = cells[j];
                    }
                    tr.appendChild(td);
                }
                recordsEl.appendChild(tr);
            }
        }

        function updateLastUpdate() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-TW');
            document.getElementById('lastUpdate').textContent = timeStr;
        }

        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            
            loadStatistics();
            loadRecords();
            updateLastUpdate();

            refreshTimer = setInterval(() => {
                loadStatistics();
                loadRecords();
                updateLastUpdate();
            }, REFRESH_INTERVAL_MS);
        }

        // 頁面載入時自動刷新
        window.addEventListener('load', startAutoRefresh);

        // 頁面關閉時停止刷新
        window.addEventListener('beforeunload', () => {
            if (refreshTimer) clearInterval(refreshTimer);
        });
    </script>
</body>
</html>
